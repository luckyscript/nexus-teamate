openapi: 3.0.3
info:
  title: Nexus Teammate API
  version: 0.1.0
  description: |
    MVP OpenAPI draft for Nexus Teammate.
    Tech stack: React + Midwayjs + MySQL.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Projects
  - name: Boards
  - name: Tasks
  - name: Automation
  - name: Agents
  - name: Assets
  - name: Connectors
  - name: Analytics
  - name: System
paths:
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CurrentUser'
  /projects:
    get:
      tags: [Projects]
      summary: Get project list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Project created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Project'
  /projects/{projectId}/boards:
    get:
      tags: [Boards]
      summary: Get boards in project
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Board list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Board'
    post:
      tags: [Boards]
      summary: Create board
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardRequest'
      responses:
        '200':
          description: Board created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Board'
  /boards/{boardId}/tasks:
    get:
      tags: [Tasks]
      summary: Get board tasks
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: assigneeId
          in: query
          schema:
            type: integer
            format: int64
        - name: aiState
          in: query
          schema:
            type: string
        - name: takeoverState
          in: query
          schema:
            type: string
        - name: viewMode
          in: query
          schema:
            type: string
            enum: [kanban, list]
            default: kanban
      responses:
        '200':
          description: Board tasks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BoardTasksResponse'
  /tasks:
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateTaskResponse'
  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get task detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskDetail'
    put:
      tags: [Tasks]
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /tasks/{taskId}/transition:
    post:
      tags: [Tasks]
      summary: Transition task status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionTaskRequest'
      responses:
        '200':
          description: Transition accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /tasks/{taskId}/comments:
    post:
      tags: [Tasks]
      summary: Add task comment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskCommentRequest'
      responses:
        '200':
          description: Comment added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskComment'
  /tasks/{taskId}/takeover:
    post:
      tags: [Tasks]
      summary: Take over or continue task
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskTakeoverRequest'
      responses:
        '200':
          description: Takeover action applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /automation/rules:
    get:
      tags: [Automation]
      summary: Get automation rule list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: projectId
          in: query
          schema:
            type: integer
            format: int64
        - name: boardId
          in: query
          schema:
            type: integer
            format: int64
        - name: eventType
          in: query
          schema:
            type: string
        - name: isEnabled
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/AutomationRule'
    post:
      tags: [Automation]
      summary: Create automation rule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutomationRuleRequest'
      responses:
        '200':
          description: Rule created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AutomationRule'
  /automation/rules/validate:
    post:
      tags: [Automation]
      summary: Validate automation DSL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAutomationRuleRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RuleValidationResult'
  /agents:
    get:
      tags: [Agents]
      summary: Get agent list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/AgentDefinition'
    post:
      tags: [Agents]
      summary: Create agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '200':
          description: Agent created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentDefinition'
  /agents/{agentId}/execute:
    post:
      tags: [Agents]
      summary: Execute agent manually
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteAgentRequest'
      responses:
        '200':
          description: Execution queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentExecutionQueuedResponse'
  /agents/executions/{executionId}:
    get:
      tags: [Agents]
      summary: Get agent execution detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: Execution detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentExecutionDetail'
  /assets/templates:
    get:
      tags: [Assets]
      summary: Get templates
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Template'
  /connectors/webhooks/{connectorCode}:
    post:
      tags: [Connectors]
      summary: Receive connector webhook
      parameters:
        - name: connectorCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accepted:
                            type: boolean
                          eventId:
                            type: string
  /analytics/overview:
    get:
      tags: [Analytics]
      summary: Get analytics overview
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
            format: int64
        - name: boardId
          in: query
          schema:
            type: integer
            format: int64
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Overview data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AnalyticsOverview'
  /system/stream:
    get:
      tags: [System]
      summary: SSE stream for task and execution updates
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: query
          schema:
            type: string
            enum: [task]
        - name: boardId
          in: query
          schema:
            type: integer
            format: int64
        - name: taskId
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BoardId:
      name: boardId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiResponse:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        data:
          nullable: true
        requestId:
          type: string
    PaginatedResponse:
      type: object
      required: [code, message, data, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'
        requestId:
          type: string
    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    CurrentUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tenantId:
          type: integer
          format: int64
        username:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    Project:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
          format: int64
        status:
          type: string
    CreateProjectRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
          format: int64
    Board:
      type: object
      properties:
        id:
          type: integer
          format: int64
        projectId:
          type: integer
          format: int64
        name:
          type: string
        viewType:
          type: string
        status:
          type: string
    CreateBoardRequest:
      type: object
      required: [name, viewType]
      properties:
        name:
          type: string
        viewType:
          type: string
          enum: [kanban, list]
        templateId:
          type: integer
          format: int64
          nullable: true
    UserSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Label:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    LatestExecutionSummary:
      type: object
      properties:
        executionId:
          type: integer
          format: int64
        agentName:
          type: string
        status:
          type: string
        summary:
          type: string
    TaskCard:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        priority:
          type: string
        aiState:
          type: string
        takeoverState:
          type: string
        assignee:
          $ref: '#/components/schemas/UserSummary'
        latestExecution:
          $ref: '#/components/schemas/LatestExecutionSummary'
    BoardTaskColumn:
      type: object
      properties:
        statusCode:
          type: string
        name:
          type: string
        count:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskCard'
    BoardTasksResponse:
      type: object
      properties:
        viewMode:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/BoardTaskColumn'
        list:
          type: array
          items:
            $ref: '#/components/schemas/TaskCard'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTaskRequest:
      type: object
      required: [projectId, boardId, title, sourceType]
      properties:
        projectId:
          type: integer
          format: int64
        boardId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        assigneeId:
          type: integer
          format: int64
        sourceType:
          type: string
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        customFields:
          type: object
          additionalProperties: true
    CreateTaskResponse:
      type: object
      properties:
        taskId:
          type: integer
          format: int64
        statusCode:
          type: string
        createdExecutionIds:
          type: array
          items:
            type: integer
            format: int64
    TaskComment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        authorType:
          type: string
        authorName:
          type: string
        content:
          type: string
        contentType:
          type: string
        createdAt:
          type: string
          format: date-time
    TaskDetail:
      type: object
      properties:
        base:
          $ref: '#/components/schemas/TaskBase'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/TaskComment'
        latestExecutions:
          type: array
          items:
            $ref: '#/components/schemas/AgentExecutionDetail'
        availableActions:
          type: array
          items:
            type: string
        customFields:
          type: object
          additionalProperties: true
    TaskBase:
      type: object
      properties:
        id:
          type: integer
          format: int64
        projectId:
          type: integer
          format: int64
        boardId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        statusCode:
          type: string
        priority:
          type: string
        aiState:
          type: string
        takeoverState:
          type: string
        assigneeId:
          type: integer
          format: int64
          nullable: true
        version:
          type: integer
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        assigneeId:
          type: integer
          format: int64
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        customFields:
          type: object
          additionalProperties: true
    TransitionTaskRequest:
      type: object
      required: [toStatusCode, version]
      properties:
        toStatusCode:
          type: string
        reason:
          type: string
        version:
          type: integer
    CreateTaskCommentRequest:
      type: object
      required: [content, contentType]
      properties:
        content:
          type: string
        contentType:
          type: string
          enum: [markdown, plain_text]
    TaskTakeoverRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [takeover, release, continue, terminate]
        reason:
          type: string
    AutomationCondition:
      type: object
      properties:
        field:
          type: string
        op:
          type: string
        value: {}
    AutomationAction:
      type: object
      properties:
        type:
          type: string
        agentKey:
          type: string
        to:
          type: string
    AutomationRule:
      type: object
      properties:
        id:
          type: integer
          format: int64
        projectId:
          type: integer
          format: int64
          nullable: true
        boardId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        ruleKey:
          type: string
        eventType:
          type: string
        priority:
          type: integer
        isEnabled:
          type: boolean
        conditionDsl:
          type: object
          additionalProperties: true
        actionDsl:
          type: array
          items:
            $ref: '#/components/schemas/AutomationAction'
    CreateAutomationRuleRequest:
      type: object
      required: [name, ruleKey, eventType, priority, conditionDsl, actionDsl]
      properties:
        projectId:
          type: integer
          format: int64
          nullable: true
        boardId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        ruleKey:
          type: string
        eventType:
          type: string
        priority:
          type: integer
        isEnabled:
          type: boolean
        conditionDsl:
          type: object
          additionalProperties: true
        actionDsl:
          type: array
          items:
            $ref: '#/components/schemas/AutomationAction'
    ValidateAutomationRuleRequest:
      type: object
      required: [eventType, conditionDsl, actionDsl]
      properties:
        eventType:
          type: string
        conditionDsl:
          type: object
          additionalProperties: true
        actionDsl:
          type: array
          items:
            $ref: '#/components/schemas/AutomationAction'
    RuleValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
